name: Build, Test & Deploy – FlowMetrics

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required for OIDC token exchange with Azure
permissions:
  id-token: write   # mint the OIDC JWT
  contents: read    # checkout the repo

env:
  NODE_VERSION: '24.x'
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}   # set as a GitHub Actions variable
  RESOURCE_GROUP: Tests

jobs:
  # ── 1. Build & Test ───────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Prepare deployment artifact
        # Install only production deps for the artifact
        run: npm ci --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !.github/
            !tests/
            !*.md

  # ── 2. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # OIDC login — no long-lived secrets, uses the Managed Identity
      # federated credential bound to: repo:yasindu-tech/flowmetrics:ref:refs/heads/main
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
