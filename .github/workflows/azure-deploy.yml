name: Build, Test & Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual triggers from GitHub UI

env:
  NODE_VERSION: '24.x'
  AZURE_WEBAPP_NAME: your-app-service-name   # ← replace with your Azure App Service name
  AZURE_WEBAPP_PACKAGE_PATH: '.'             # root of the repo

jobs:
  # ── 1. Build & Test ───────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Exclude dev tooling — only ship what's needed to run the app
          path: |
            .
            !node_modules/
            !tests/
            !.github/
            !*.md

  # ── 2. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
