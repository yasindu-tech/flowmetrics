name: Build and Deploy Node App to Azure

# Trigger this workflow whenever code is pushed to the 'main' branch
on:
  push:
    branches:
      - main

# UPDATE THESE VARIABLES to match your Azure resources
env:
  REGISTRY_NAME: myregistery2003.azurecr.io # Your ACR Login server name
  IMAGE_NAME: simple-node-app               # Whatever you want to name your image
  WEBAPP_NAME: my-cool-node-app             # The name of your Azure Web App

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Log into your Azure Container Registry
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY_NAME }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Build the Docker image and push it to the Registry
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 4. Tell Azure App Service to pull the new image and restart
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        images: '${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'